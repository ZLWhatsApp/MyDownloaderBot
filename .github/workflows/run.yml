name: Run Downloader Bot
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # سيعيد التشغيل كل 6 ساعات لضمان بقائه حياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Bot
        run: python main.py
